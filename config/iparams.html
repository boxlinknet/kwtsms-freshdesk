<!DOCTYPE html>
<html>
<head>
  <script src="https://static.freshdev.io/fdk/2.0/assets/fresh_client.js"></script>
  <style>
    .iparams-container {
      max-width: 500px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #333;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 20px 0;
      color: #1f2937;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-weight: 500;
      margin-bottom: 4px;
      color: #374151;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }

    .help-text {
      display: block;
      font-size: 12px;
      color: #6b7280;
      margin-top: 4px;
    }

    .btn {
      padding: 8px 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-primary:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .status-success {
      background: #d1fae5;
      color: #065f46;
    }

    .status-error {
      background: #fee2e2;
      color: #991b1b;
    }

    .status-loading {
      background: #e0e7ff;
      color: #3730a3;
    }

    .info-box {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 6px;
      padding: 12px;
      margin-top: 12px;
    }

    .info-row {
      margin-bottom: 4px;
      font-size: 13px;
    }

    .info-label {
      font-weight: 500;
      color: #374151;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="iparams-container">
    <h3 class="section-title">kwtSMS Gateway Configuration</h3>

    <div class="form-group">
      <label for="kwtsms_username">API Username</label>
      <input type="text" id="kwtsms_username" name="kwtsms_username" required
             placeholder="Your kwtSMS API username (not mobile number)">
      <small class="help-text">Enter the API username from your kwtSMS account</small>
    </div>

    <div class="form-group">
      <label for="kwtsms_password">API Password</label>
      <input type="password" id="kwtsms_password" name="kwtsms_password" required
             placeholder="Your kwtSMS API password">
    </div>

    <div class="form-group">
      <button type="button" id="btn-test" class="btn btn-primary" onclick="testConnection()">
        Login
      </button>
      <span id="connection-status" class="status-badge hidden"></span>
    </div>

    <div id="sender-group" class="form-group hidden">
      <label for="kwtsms_senderid">Sender ID</label>
      <select id="kwtsms_senderid" name="kwtsms_senderid">
        <option value="KWT-SMS">KWT-SMS (test only)</option>
      </select>
      <small class="help-text">Select a sender ID from your kwtSMS account</small>
    </div>

    <div class="form-group">
      <label for="kwtsms_company_name">Company Name</label>
      <input type="text" id="kwtsms_company_name" name="kwtsms_company_name" required
             placeholder="Your company/brand name for SMS templates">
      <small class="help-text">This appears in SMS messages as {{company_name}}</small>
    </div>

    <div id="gateway-info" class="info-box hidden">
      <div class="info-row"><span class="info-label">Balance:</span> <span id="info-balance">-</span></div>
      <div class="info-row"><span class="info-label">Sender IDs:</span> <span id="info-senders">-</span></div>
    </div>
  </div>

  <script>
    /**
     * iparams.js - Custom installation page logic
     *
     * Handles Test Connection flow: validates kwtSMS credentials by calling /balance/,
     * then fetches sender IDs on success. During installation, secure iparams are not
     * yet saved, so we use client.request.post() with explicit credentials in the body
     * rather than invokeTemplate (which needs saved iparams).
     */

    let client;

    document.addEventListener('DOMContentLoaded', function() {
      app.initialized().then(function(_client) {
        client = _client;
      });
    });

    /**
     * FDK required: return all iparam values for saving.
     */
    function getConfigs() {
      return {
        kwtsms_username: document.getElementById('kwtsms_username').value,
        kwtsms_password: document.getElementById('kwtsms_password').value,
        kwtsms_senderid: document.getElementById('kwtsms_senderid').value,
        kwtsms_company_name: document.getElementById('kwtsms_company_name').value
      };
    }

    /**
     * FDK required: populate form fields from saved configs (called on edit/reinstall).
     */
    function postConfigs(configs) {
      document.getElementById('kwtsms_username').value = configs.kwtsms_username || '';
      document.getElementById('kwtsms_password').value = configs.kwtsms_password || '';
      document.getElementById('kwtsms_senderid').value = configs.kwtsms_senderid || '';
      document.getElementById('kwtsms_company_name').value = configs.kwtsms_company_name || '';
    }

    function testConnection() {
      let username = document.getElementById('kwtsms_username').value.trim();
      let password = document.getElementById('kwtsms_password').value.trim();

      if (!username || !password) {
        showStatus('error', 'Please enter username and password');
        return;
      }

      let btnTest = document.getElementById('btn-test');
      btnTest.disabled = true;
      btnTest.textContent = 'Logging in...';
      showStatus('loading', 'Connecting to kwtSMS...');

      // Use invokeTemplate with dynamic body (domain whitelisted via requests.json)
      client.request.invokeTemplate('checkBalance', {
        body: JSON.stringify({ username: username, password: password })
      })
        .then(function(data) {
          let response = JSON.parse(data.response);
          if (response.result === 'OK') {
            document.getElementById('info-balance').textContent = response.available + ' credits';
            showStatus('success', 'Connected! Balance: ' + response.available + ' credits');
            fetchSenderIds(username, password);
            document.getElementById('gateway-info').classList.remove('hidden');
          } else {
            showStatus('error', 'Authentication failed: ' + (response.description || 'Check your credentials'));
            resetForm();
          }
        })
        .catch(function() {
          showStatus('error', 'Could not connect to kwtSMS. Please try again.');
          resetForm();
        })
        .finally(function() {
          btnTest.disabled = false;
          btnTest.textContent = 'Login';
        });
    }

    function fetchSenderIds(username, password) {
      client.request.invokeTemplate('getSenderIds', {
        body: JSON.stringify({ username: username, password: password })
      })
        .then(function(data) {
          let response = JSON.parse(data.response);
          if (response.result === 'OK' && response.senderid) {
            let select = document.getElementById('kwtsms_senderid');
            // Clear existing options before adding new ones from API
            while (select.firstChild) {
              select.removeChild(select.firstChild);
            }
            response.senderid.forEach(function(sid) {
              let option = document.createElement('option');
              option.value = sid;
              option.textContent = sid;
              select.appendChild(option);
            });
            document.getElementById('sender-group').classList.remove('hidden');
            document.getElementById('info-senders').textContent = response.senderid.join(', ');
          }
        })
        .catch(function(err) {
          console.error('Failed to fetch sender IDs:', err);
        });
    }

    function showStatus(type, message) {
      let statusEl = document.getElementById('connection-status');
      statusEl.classList.remove('hidden', 'status-success', 'status-error', 'status-loading');
      statusEl.classList.add('status-' + type);
      statusEl.textContent = message;
    }

    function resetForm() {
      document.getElementById('sender-group').classList.add('hidden');
      document.getElementById('gateway-info').classList.add('hidden');
    }

    /**
     * FDK validation callback. Called before iparams are saved.
     * Return an object with field-level errors to block saving.
     */
    function validate() {
      let errors = {};
      if (!document.getElementById('kwtsms_username').value.trim()) {
        errors.kwtsms_username = 'Username is required';
      }
      if (!document.getElementById('kwtsms_password').value.trim()) {
        errors.kwtsms_password = 'Password is required';
      }
      if (!document.getElementById('kwtsms_company_name').value.trim()) {
        errors.kwtsms_company_name = 'Company name is required';
      }
      return Object.keys(errors).length > 0 ? errors : null;
    }
  </script>
</body>
</html>
