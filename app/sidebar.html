<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;700&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
  <script src="https://static.freshdev.io/fdk/2.0/assets/fresh_client.js"></script>
  <style>
    /* Sidebar-specific overrides for narrow width */
    body { margin: 0; padding: 8px; font-family: 'Lato', 'Helvetica', 'Arial', sans-serif; font-size: 13px; color: #434345; background: #fff; }
    .sidebar-header { display: flex; align-items: center; gap: 8px; padding-bottom: 10px; border-bottom: 1px solid #E8E5E0; margin-bottom: 10px; }
    .sidebar-logo-wide { height: 28px; width: auto; }
    .sidebar-title { font-size: 14px; font-weight: 700; color: #434345; font-family: 'Montserrat', sans-serif; }
    .sidebar-subtitle { font-size: 11px; color: #6B6B6D; }
    .sidebar-meta { margin-left: auto; text-align: right; }
    .dot-green { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #2ECC71; }
    .dot-red { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #E74C3C; }
    .sidebar-balance { font-size: 11px; color: #6B6B6D; }
    .test-banner { background: #FFF8EB; border: 1px solid #FFA200; border-radius: 4px; padding: 6px 10px; font-size: 11px; color: #CC8200; margin-bottom: 10px; text-align: center; }
    .form-label { font-size: 10px; text-transform: uppercase; color: #6B6B6D; letter-spacing: 0.5px; margin-bottom: 4px; font-family: 'Montserrat', sans-serif; font-weight: 600; }
    .recipient-box { background: #FAFAF8; border: 1px solid #E8E5E0; border-radius: 4px; padding: 8px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .recipient-name { font-size: 12px; color: #434345; }
    .recipient-phone { font-size: 11px; color: #79CCF2; font-family: 'SF Mono', 'Fira Code', monospace; }
    .validation-badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; }
    .validation-badge.valid { background: #EAFAF1; color: #065f46; }
    .validation-badge.invalid { background: #FDEDEB; color: #991b1b; }
    .no-phone-msg { font-size: 11px; color: #E74C3C; margin-bottom: 8px; }
    .template-select { width: 100%; padding: 6px 8px; border: 1px solid #E8E5E0; border-radius: 4px; font-size: 12px; margin-bottom: 10px; color: #6B6B6D; background: #fff; font-family: 'Lato', sans-serif; }
    .sms-textarea { width: 100%; min-height: 70px; padding: 8px; border: 1px solid #E8E5E0; border-radius: 4px; font-size: 12px; resize: vertical; box-sizing: border-box; line-height: 1.5; color: #434345; font-family: 'Lato', sans-serif; }
    .sms-textarea:focus { outline: none; border-color: #FFA200; box-shadow: 0 0 0 2px rgba(255,162,0,0.2); }
    .char-info { display: flex; justify-content: space-between; font-size: 10px; color: #6B6B6D; margin: 4px 0 8px; }
    .btn-send { width: 100%; padding: 10px; background: #79CCF2; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 12px; font-family: 'Montserrat', sans-serif; }
    .btn-send:hover { background: #5DBDE8; }
    .btn-send:disabled { background: #9B9B9D; cursor: not-allowed; }
    .history-section { border-top: 1px solid #E8E5E0; padding-top: 10px; }
    .history-title { font-size: 10px; text-transform: uppercase; color: #6B6B6D; letter-spacing: 0.5px; margin-bottom: 8px; font-family: 'Montserrat', sans-serif; font-weight: 600; }
    .history-item { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #F2F0ED; }
    .history-header { display: flex; justify-content: space-between; margin-bottom: 2px; }
    .history-status { font-size: 10px; }
    .history-status.sent { color: #2ECC71; }
    .history-status.failed { color: #E74C3C; }
    .history-time { font-size: 10px; color: #9B9B9D; }
    .history-preview { font-size: 11px; color: #6B6B6D; line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .history-empty { font-size: 11px; color: #9B9B9D; text-align: center; padding: 12px 0; }
    .sidebar-toast { position: fixed; bottom: 10px; left: 10px; right: 10px; padding: 8px 12px; border-radius: 4px; font-size: 12px; text-align: center; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .sidebar-toast.show { opacity: 1; }
    .sidebar-toast.success { background: #EAFAF1; color: #065f46; }
    .sidebar-toast.error { background: #FDEDEB; color: #991b1b; }
    .sidebar-disabled { text-align: center; padding: 40px 16px; color: #6B6B6D; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="sidebar-disabled" class="sidebar-disabled hidden">
    <p>SMS gateway is disabled.</p>
    <p style="font-size:11px">Enable it in the kwtSMS settings page.</p>
  </div>

  <div id="sidebar-content">
    <!-- Header -->
    <div class="sidebar-header">
      <img src="img/logo.png" alt="kwtSMS" class="sidebar-logo-wide">
      <div class="sidebar-meta">
        <span id="status-dot" class="dot-green"></span>
        <div id="sidebar-balance" class="sidebar-balance">--</div>
      </div>
    </div>

    <!-- Test mode banner -->
    <div id="test-mode-banner" class="test-banner hidden">
      Test mode is ON. SMS will not be delivered.
    </div>

    <!-- Recipient -->
    <div class="form-label">Recipient</div>
    <div class="recipient-box">
      <div>
        <div id="recipient-name" class="recipient-name">Loading...</div>
        <div id="recipient-phone" class="recipient-phone">--</div>
      </div>
      <span id="phone-valid" class="validation-badge"></span>
    </div>
    <div id="no-phone-msg" class="no-phone-msg hidden">No phone number on file. Edit the contact to add one.</div>

    <!-- Template -->
    <div class="form-label">Template (optional)</div>
    <select id="template-select" class="template-select" onchange="selectTemplate()">
      <option value="">Select a template...</option>
    </select>

    <!-- Message -->
    <div class="form-label">Message</div>
    <textarea id="sms-message" class="sms-textarea" placeholder="Type your message..."></textarea>
    <div class="char-info">
      <span><span id="char-count">0</span>/<span id="char-max">160</span> chars | <span id="sms-parts">0</span> SMS | <span id="encoding-type">English</span></span>
    </div>

    <!-- Send -->
    <button id="btn-send" class="btn-send" onclick="sendSms()">Send SMS</button>

    <!-- History -->
    <div class="history-section">
      <div class="history-title">Recent SMS for this contact</div>
      <div id="history-list"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="sidebar-toast" class="sidebar-toast"></div>

  <script src="scripts/sidebar.js"></script>
</body>
</html>
